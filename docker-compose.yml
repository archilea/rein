# Rein local development compose file.
#
# Both REIN_ADMIN_TOKEN and REIN_ENCRYPTION_KEY are required and must be set
# in a .env file next to this compose file. See .env.example.
#
# Quick start:
#   cp .env.example .env
#   sed -i.bak "s|REIN_ADMIN_TOKEN=.*|REIN_ADMIN_TOKEN=$(openssl rand -hex 32)|" .env
#   sed -i.bak "s|REIN_ENCRYPTION_KEY=.*|REIN_ENCRYPTION_KEY=$(openssl rand -hex 32)|" .env
#   rm .env.bak
#   docker compose up -d

services:
  rein:
    build: .
    image: ghcr.io/archilea/rein:latest
    container_name: rein
    ports:
      - "8080:8080"
    environment:
      REIN_PORT: "8080"
      REIN_ADMIN_TOKEN: "${REIN_ADMIN_TOKEN:?REIN_ADMIN_TOKEN is required. Generate one with: openssl rand -hex 32, then set it in .env}"
      REIN_ENCRYPTION_KEY: "${REIN_ENCRYPTION_KEY:?REIN_ENCRYPTION_KEY is required for the SQLite keystore. Generate one with: openssl rand -hex 32, then set it in .env}"
      REIN_DB_URL: "sqlite:/data/rein.db"
      # Uncomment the two lines below to enable operator-editable pricing
      # overrides (#25). Pair with the commented-out rein-config volume mount
      # below. Omit to run against just the embedded pricing table.
      # REIN_CONFIG_FILE: "/etc/rein/rein.json"
      # REIN_CONFIG_POLL_INTERVAL: "${REIN_CONFIG_POLL_INTERVAL:-}"
    volumes:
      - rein-data:/data
      # Uncomment to bind-mount an operator-editable rein.json at the default
      # config path. See docs/quickstart.md section 3b for the file format.
      # - ./rein.json:/etc/rein/rein.json:ro
    restart: unless-stopped

volumes:
  rein-data:
