# Release workflow. Triggered by pushing a v*.*.* tag (e.g. v0.1.0).
# Builds a multi-arch Docker image and publishes it to GHCR at
# ghcr.io/archilea/rein:<semver> and ghcr.io/archilea/rein:latest.
#
# Security posture:
#   - Actions are SHA-pinned against supply-chain attacks via tag reuse.
#   - No untrusted github.event.* payloads (issue titles, PR bodies, commit
#     messages) are consumed in any run: step. github.actor is used only as a
#     registry login username, not in shell expansion. github.ref_name is not
#     referenced; version embedding via ldflags is deferred to a follow-up.
#   - Permissions are scoped to contents:read + packages:write only.
name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: build and publish docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/archilea/rein
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
