# CI workflow for Rein. Runs on every push to main and every PR.
# Actions are SHA-pinned to defend against supply-chain attacks via tag reuse.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same ref when a new commit lands.
# Safe here because every job is idempotent (lint, test, build, docker build).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: .go-version
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

  dockerfile-lint:
    name: hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: .go-version
          cache: true
      - name: go vet
        run: go vet ./...
      - name: Run tests with race detector
        run: go test ./... -race -coverprofile=coverage.out
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: .go-version
          cache: true
      - name: Build binary
        run: go build -trimpath -ldflags="-s -w" -o /tmp/rein ./cmd/rein

  # Audit-friendly ceiling — dependency caps (#39). Fast Go-only checks
  # that enforce the direct-deps and compiled-deps guarantees from the
  # README's Audit-friendly ceiling section on every PR. The image-size
  # cap is enforced in the docker job below so we only pay for one
  # docker build per CI run. Breaches fail the build; see the inline
  # error messages for the budget-increase pattern. No untrusted
  # github.event.* inputs are consumed in any run: step; all thresholds
  # are fixed literals in env blocks so the cap history is grep-able.
  deps-cap:
    name: deps-cap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: .go-version
          cache: true
      - name: Direct non-stdlib dependency cap
        env:
          MAX_DIRECT_DEPS: "1"
        run: |
          set -euo pipefail
          direct=$(awk '
            /^require \(/ {in_block=1; next}
            /^\)/ {in_block=0; next}
            in_block && $0 !~ /indirect/ && NF > 0 {c++}
            /^require [^(]/ && $0 !~ /indirect/ {c++}
            END {print c+0}
          ' go.mod)
          echo "direct non-stdlib deps: $direct (cap: $MAX_DIRECT_DEPS)"
          if [ "$direct" -gt "$MAX_DIRECT_DEPS" ]; then
            echo "::error file=go.mod::Direct non-stdlib dependency count $direct exceeds cap $MAX_DIRECT_DEPS. If intentional, bump MAX_DIRECT_DEPS in .github/workflows/ci.yml in the same commit and add a ### Changed entry to CHANGELOG.md."
            exit 1
          fi
      - name: Compiled production dependency cap
        env:
          MAX_COMPILED_DEPS: "15"
        run: |
          set -euo pipefail
          compiled=$(go list -deps -f '{{if and .Module (not .Standard)}}{{.Module.Path}}{{end}}' ./cmd/rein \
            | sort -u \
            | grep -v '^github.com/archilea/rein$' \
            | wc -l \
            | tr -d ' ')
          echo "compiled production deps: $compiled (cap: $MAX_COMPILED_DEPS)"
          if [ "$compiled" -gt "$MAX_COMPILED_DEPS" ]; then
            echo "::error::Compiled production dependency count $compiled exceeds cap $MAX_COMPILED_DEPS. If intentional, bump MAX_COMPILED_DEPS in .github/workflows/ci.yml in the same commit and add a ### Changed entry to CHANGELOG.md."
            exit 1
          fi

  docker:
    name: docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, dockerfile-lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: rein:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Audit-friendly ceiling — image size cap (#39). Internal
      # early-warning threshold is 15 MiB; public commitment in README is
      # 20 MB. The 5 MB slack is deliberate so drift is caught in CI
      # before it burns the public safety margin. docker save | gzip
      # produces a conservative upper bound within a few percent of
      # GHCR's compressed manifest size (gzip of uncompressed tar of
      # already-gzipped layers). Measurement noise is irrelevant for a
      # cap on an ~12 MB image.
      - name: Compressed image size cap
        env:
          MAX_IMAGE_BYTES: "15728640"
        run: |
          set -euo pipefail
          size=$(docker save rein:ci | gzip -c | wc -c | tr -d ' ')
          human=$(( size / 1024 / 1024 ))
          max_human=$(( MAX_IMAGE_BYTES / 1024 / 1024 ))
          echo "compressed image size: ${size} bytes (~${human} MB, internal cap: ${max_human} MB, public commitment: 20 MB)"
          if [ "$size" -gt "$MAX_IMAGE_BYTES" ]; then
            echo "::error::Compressed image size ${size} bytes (~${human} MB) exceeds internal early-warning cap of ${max_human} MB. Public commitment is 20 MB, this CI threshold is tighter on purpose. Investigate the binary size delta; if genuinely unavoidable, bump MAX_IMAGE_BYTES in .github/workflows/ci.yml in the same commit and add a ### Changed entry to CHANGELOG.md."
            exit 1
          fi
