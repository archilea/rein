name: Scorecard supply-chain security

# Temporarily gated to manual dispatch only while the repo is private.
# OpenSSF Scorecard only supports public repositories (it queries public
# metadata and uploads SARIF via security-events, both of which require
# public-repo access). Restore the branch_protection_rule/schedule/push
# triggers below once the repo is public again.
on:
  workflow_dispatch:
  # branch_protection_rule:
  # schedule:
  #   - cron: "0 4 * * 4" # weekly on Thursday 04:00 UTC
  # push:
  #   branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.event.repository.default_branch == github.ref_name
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 7

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          sarif_file: results.sarif
